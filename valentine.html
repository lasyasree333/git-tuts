<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>For Sateesh ❤️</title>

  <!-- Mobile perfect viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      width: 90%;
      max-width: 360px;
      text-align: center;
      background: rgba(255,255,255,0.95);
      padding: 30px 20px;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      z-index: 10;
    }

    h1 {
      color: #e6005c;
      font-size: 28px;
      margin-bottom: 25px;
      line-height: 1.3;
    }

    .buttons {
      position: relative;
      height: 90px;
      margin-top: 10px;
    }

    button {
      width: 130px;
      padding: 14px 0;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    #yesBtn {
      background: #ff3366;
      color: white;
    }

    #yesBtn:active {
      transform: scale(0.95);
    }

    #noBtn {
      background: #ddd;
      color: #444;
      position: absolute;
      left: 160px;
      top: 0;
    }

    .message {
      display: none;
      margin-top: 25px;
      font-size: 20px;
      color: #e6005c;
      line-height: 1.4;
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      bottom: -40px;
      font-size: 22px;
      animation: floatUp linear infinite;
      opacity: 0.9;
    }

    @keyframes floatUp {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(-120vh) scale(1.6); opacity: 0; }
    }

    /* Hug follower */
    #hug {
      position: fixed;
      font-size: 38px;
      pointer-events: none;
      display: none;
      z-index: 999;
    }

    /* Final screen */
    #final {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: white;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      z-index: 1000;
      padding: 20px;
    }

    #final h2 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    #final p {
      font-size: 22px;
    }
  </style>
</head>
<body>

  <div class="container" id="mainBox">
    <h1>Sateesh 💕<br>Will you be my Valentine?</h1>

    <div class="buttons">
      <button id="yesBtn">Yes ❤️</button>
      <button id="noBtn">No 😜</button>
    </div>

    <div class="message" id="message">
      I knew you would say YES! 😍💖<br><br>
      I need many hugs and kisses 🫂💋<br>
      Will you give me? 🥰
    </div>
  </div>

  <div id="hug">🤗💋</div>

  <div id="final">
    <h2>I love you Sateesh ❤️😘</h2>
    <p>Forever & Always 💖</p>
  </div>

  <!-- Audio -->
  <audio id="music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
  </audio>

  <audio id="kiss">
    <source src="https://www.fesliyanstudios.com/play-mp3/6964">
  </audio>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const message = document.getElementById("message");
    const hug = document.getElementById("hug");
    const music = document.getElementById("music");
    const kiss = document.getElementById("kiss");
    const final = document.getElementById("final");
    const mainBox = document.getElementById("mainBox");

    // NO button escapes (touch + hover)
    function moveNo() {
      const x = Math.random() * 160 - 80;
      const y = Math.random() * 60 - 30;
      noBtn.style.transform = `translate(${x}px, ${y}px)`;
    }
    noBtn.addEventListener("mouseover", moveNo);
    noBtn.addEventListener("touchstart", moveNo);

    // YES button
    yesBtn.addEventListener("click", () => {
      message.style.display = "block";
      yesBtn.style.display = "none";
      noBtn.style.display = "none";
      hug.style.display = "block";
      music.play();

      setTimeout(() => {
        mainBox.style.display = "none";
        final.style.display = "flex";
      }, 6000);
    });

    // Hug follows finger / cursor
    document.addEventListener("mousemove", e => {
      hug.style.left = e.clientX + 10 + "px";
      hug.style.top = e.clientY + 10 + "px";
    });

    document.addEventListener("touchmove", e => {
      const t = e.touches[0];
      hug.style.left = t.clientX + 10 + "px";
      hug.style.top = t.clientY + 10 + "px";
    });

    // Kiss sound on tap
    document.addEventListener("click", () => {
      if (hug.style.display === "block") {
        kiss.currentTime = 0;
        kiss.play();
      }
    });

    // Floating hearts
    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (5 + Math.random() * 5) + "s";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 10000);
    }
    setInterval(createHeart, 600);
  </script>

</body>
</html>
